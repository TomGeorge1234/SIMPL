site_name: SIMPL
site_url: https://tomge.org/SIMPL/
repo_url: https://github.com/TomGeorge1234/SIMPL
repo_name: TomGeorge1234/SIMPL
theme:
  name: material
  logo: assets/simpl_emblem.png
  favicon: assets/favicon_io/favicon.ico
  icon:
    repo: fontawesome/brands/github
  palette:
    # Light mode
    - scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: Fira Code
  features:
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - toc.integrate
    - content.code.copy
markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: true
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
extra_css:
  - stylesheets/extra.css
plugins:
  - search
  - include-markdown
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            docstring_style: numpy
nav:
  - Overview: index.md
  - Quickstart: quickstart.md
  - Model / Maths: model.md
  - Plotting and Metrics: plotting.md
  - Advanced Usage: advanced-usage.md
  - Examples/Demos: examples.md
  - Code & Docstring Reference:
    - SIMPL: api/simpl.md
    - Environment: api/environment.md
    - Kalman Filter: api/kalman.md
    - KDE: api/kde.md
    - Plotting: api/plotting.md
    - Utilities: api/utils.md
    - Variable Registry: api/variable_registry.md
