site_name: SIMPL
site_url: https://tomge.org/SIMPL/
repo_url: https://github.com/TomGeorge1234/SIMPL
theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: Fira Code
  features:
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - toc.integrate
    - content.code.copy
markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: true
extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
extra_css:
  - stylesheets/extra.css
plugins:
  - search
  - include-markdown
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            docstring_style: numpy
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference:
    - SIMPL: api/simpl.md
    - Environment: api/environment.md
    - Kalman Filter: api/kalman.md
    - KDE: api/kde.md
    - Plotting: api/plotting.md
    - Utilities: api/utils.md
