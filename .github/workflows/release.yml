name: Upload demo data to release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  upload-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload data files to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in examples/data/*.npz; do
            echo "Uploading $f ..."
            gh release upload "${{ github.event.release.tag_name }}" "$f" --clobber
          done
